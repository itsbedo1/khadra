<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // Background
  const grad = ctx.createRadialGradient(s*.4,s*.35,0, s*.5,s*.5,s*.6);
  grad.addColorStop(0, '#2d7a4f');
  grad.addColorStop(1, '#1a4a2e');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s*.2);
  ctx.fill();
  // Emoji
  ctx.font = `${s*.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🥬', s*.5, s*.5);
  // Text
  ctx.fillStyle = '#a8e6c1';
  ctx.font = `bold ${s*.1}px Cairo,Arial`;
  ctx.fillText('خضرة', s*.5, s*.82);
}

// 192
const c192 = document.getElementById('c192');
drawIcon(c192);
const a192 = document.createElement('a');
a192.download = 'icon-192.png';
a192.href = c192.toDataURL('image/png');
a192.textContent = 'تحميل icon-192.png';
document.body.appendChild(a192); a192.style.display='block'; a192.style.margin='10px';

// 512
const c512 = document.getElementById('c512');
drawIcon(c512);
const a512 = document.createElement('a');
a512.download = 'icon-512.png';
a512.href = c512.toDataURL('image/png');
a512.textContent = 'تحميل icon-512.png';
document.body.appendChild(a512); a512.style.display='block'; a512.style.margin='10px';
</script>
</body>
</html>
